default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict]

  - repo: local
    hooks:
      - id: pint
        name: pint
        entry: vendor/bin/pint
        language: system
        types: [php]
      - id: phpunit
        name: phpunit
        entry: vendor/bin/phpunit
        language: system
        pass_filenames: false
        always_run: true
